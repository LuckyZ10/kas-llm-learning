# MAML元学习配置

meta_learning:
  type: "maml"
  
  # MAML配置
  inner_lr: 0.01
  outer_lr: 0.001
  num_inner_steps: 5
  num_tasks_per_batch: 4
  first_order: false
  
  # 任务配置
  k_shot: 5
  q_query: 15
  num_meta_iterations: 1000
  eval_interval: 100

encoder:
  vocab_size: 10000
  embedding_dim: 256
  hidden_dim: 512
  output_dim: 128
  num_layers: 4
  num_heads: 8
  dropout: 0.1

project_data:
  num_projects: 100
  projects_per_task: 10
  feature_dim: 128
  label_dim: 64

training:
  log_dir: "./logs/maml_training"
  experiment_name: "kas_maml_meta"
  device: "cuda"
