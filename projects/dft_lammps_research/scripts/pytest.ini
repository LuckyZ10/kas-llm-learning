# PyTest 主配置文件
# Pytest Configuration for DFT-MD-ML Research Platform
# =============================================================================
# 
# 使用方法:
#   pytest                              # 运行所有测试
#   pytest -m unit                      # 仅运行单元测试
#   pytest -m integration               # 运行集成测试
#   pytest -m "not slow"                # 跳过慢速测试
#   pytest --cov=src tests/             # 生成覆盖率报告
#   pytest --benchmark-only             # 仅运行性能基准测试
#
# =============================================================================

[tool:pytest]
# 测试发现配置
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -ra
    --strict-markers
    --tb=short
    --strict-config
    --disable-warnings
    --color=yes

# 标记定义
markers =
    # 测试类型标记
    unit: Unit tests for individual components
    integration: Integration tests between components
    e2e: End-to-end tests
    regression: Regression tests for scientific accuracy
    performance: Performance and benchmark tests
    
    # 功能模块标记
    dft: DFT calculation related tests
    ml: Machine learning potential tests
    md: Molecular dynamics tests
    hpc: HPC scheduler tests
    workflow: Workflow management tests
    api: API endpoint tests
    
    # 执行特性标记
    slow: Slow tests (excluded in quick runs)
    gpu: Tests requiring GPU
    mpi: Tests requiring MPI
    lammps: Tests requiring LAMMPS
    vasp: Tests requiring VASP
    
    # 科学计算标记
    numerical: Numerical accuracy tests
    deterministic: Deterministic reproducibility tests
    stochastic: Tests with randomness

# 过滤配置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:numpy
    ignore::UserWarning:matplotlib
    ignore::UserWarning:ase

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 控制台输出
console_output_style = progress

# 超时配置 (秒)
timeout = 300

[pytest]
# 与[tool:pytest]同步
testpaths = tests
addopts = -ra --strict-markers --tb=short --color=yes

# =============================================================================
# 覆盖率配置 (pytest-cov)
# =============================================================================
[coverage:run]
source = 
    .
    dft_to_lammps_bridge
    nep_training_pipeline
    hpc_scheduler
    integrated_materials_workflow
    checkpoint_manager
    battery_screening_pipeline
    parallel_optimizer
    active_learning_v2
    phase_field
    literature_survey
    webui_v2/backend
    code_templates

branch = True
parallel = True
concurrency = 
    thread
    multiprocessing

omit = 
    tests/*
    benchmarks/*
    examples/*
    docs/*
    */__pycache__/*
    .venv/*
    venv/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

fail_under = 70

[coverage:html]
directory = test_reports/htmlcov

[coverage:xml]
output = test_reports/coverage.xml

# =============================================================================
# 测试数据配置
# =============================================================================
[tool:pytest.test_data]
# 测试数据目录
fixtures_dir = tests/fixtures
data_dir = tests/fixtures/data
models_dir = tests/fixtures/models
configs_dir = tests/fixtures/configs

# 基准数据集版本
benchmark_data_version = v1.0.0

# 大文件阈值 (MB)
large_file_threshold = 100
