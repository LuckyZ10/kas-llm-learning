# Codecov Configuration
# =====================

# 文档: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        base: auto
        paths:
          - "dft_to_lammps_bridge"
          - "nep_training_pipeline"
          - "hpc_scheduler"
          - "integrated_materials_workflow"
        if_ci_failed: error
        informational: false
        only_pulls: false
    
    patch:
      default:
        target: 70%
        threshold: 5%
        base: auto
        if_ci_failed: error
        only_pulls: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**/*"
  - "benchmarks/**/*"
  - "examples/**/*"
  - "docs/**/*"
  - "scripts/**/*"
  - "setup.py"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
