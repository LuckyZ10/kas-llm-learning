# =============================================================================
# Continuous Integration / Continuous Deployment Workflows
# =============================================================================
# 
# This workflow runs on:
#   - Push to main/master branches
#   - Pull requests to main/master
#   - Daily scheduled runs (for monitoring)
#   - Manual dispatch
#
# Stages:
#   1. Code Quality (lint, format, security)
#   2. Unit Tests (fast, isolated)
#   3. Integration Tests (cross-module)
#   4. Regression Tests (scientific accuracy)
#   5. Performance Tests (benchmarks)
#   6. Documentation Build
#
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'examples/**'
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run daily at 02:00 UTC (10:00 CST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - unit
          - integration
          - regression
          - performance
      python_version:
        description: 'Python version'
        required: true
        default: '3.10'
        type: choice
        options:
          - '3.9'
          - '3.10'
          - '3.11'

# Concurrency control
testing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PYTEST_ADDOPTS: "--color=yes"
  FORCE_COLOR: "1"

jobs:
  # ==========================================================================
  # Job 1: Code Quality Checks
  # ==========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy bandit safety

      - name: Check code formatting with Black
        run: black --check --diff .

      - name: Check import sorting with isort
        run: isort --check-only --diff .

      - name: Lint with flake8
        run: |
          flake8 . --count --statistics --show-source

      - name: Type check with mypy
        run: |
          mypy --ignore-missing-imports --show-error-codes dft_to_lammps_bridge nep_training_pipeline hpc_scheduler || true

      - name: Security scan with bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll || true

      - name: Check for known security vulnerabilities
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          safety check --full-report || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ==========================================================================
  # Job 2: Unit Tests (Fast)
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-cov pytest-xdist pytest-timeout
          pip install pytest-randomly pytest-mock responses

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit -v \
            -m "unit and not slow" \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=junit-unit.xml \
            --timeout=120 \
            -n auto || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit-unit.xml
            htmlcov/
          retention-days: 30

  # ==========================================================================
  # Job 3: Integration Tests
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-timeout pytest-asyncio
          pip install mongomock fakeredis

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          MONGODB_URL: mongodb://test:test@localhost:27017
        run: |
          pytest tests/integration -v \
            -m integration \
            --junitxml=junit-integration.xml \
            --timeout=300 \
            --tb=short || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            junit-integration.xml
          retention-days: 30

  # ==========================================================================
  # Job 4: Regression Tests (Scientific Accuracy)
  # ==========================================================================
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'regression' || github.event.inputs.test_type == 'full'
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout benchmark data
        run: |
          git lfs pull || echo "No LFS files"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-timeout numpy pandas scipy

      - name: Run regression tests
        run: |
          pytest tests/regression -v \
            -m regression \
            --junitxml=junit-regression.xml \
            --timeout=600 \
            --tb=short || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            junit-regression.xml
            test_reports/
          retention-days: 90

  # ==========================================================================
  # Job 5: Performance Benchmarks
  # ==========================================================================
  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'full'
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-benchmark pytest-timeout

      - name: Run performance tests
        run: |
          pytest tests/performance benchmarks/ -v \
            -m "performance or benchmark" \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --timeout=300 || true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
          retention-days: 90

      - name: Compare benchmarks
        if: github.event_name == 'pull_request'
        run: |
          echo "Comparing performance benchmarks..."
          # Install github-action-benchmark for PR comments
          pip install github-action-benchmark || true

  # ==========================================================================
  # Job 6: End-to-End Tests
  # ==========================================================================
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || github.event.inputs.test_type == 'full'
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-timeout playwright
          playwright install

      - name: Run E2E tests
        run: |
          pytest tests/e2e -v \
            -m e2e \
            --junitxml=junit-e2e.xml \
            --timeout=600 \
            --tb=short || true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            junit-e2e.xml
          retention-days: 30

  # ==========================================================================
  # Job 7: Documentation Build
  # ==========================================================================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install docs dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build documentation
        run: |
          mkdocs build --strict || echo "No mkdocs.yml found"

      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: site/
          retention-days: 7

  # ==========================================================================
  # Job 8: Summary and Notifications
  # ==========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, regression-tests, performance-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate test summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for file in artifacts/*/junit-*.xml; do
            if [ -f "$file" ]; then
              echo "- $(basename $file)" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Post coverage comment (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## CI Test Results
            
            - Unit Tests: ${{ needs.unit-tests.result }}
            - Integration Tests: ${{ needs.integration-tests.result }}
            - Regression Tests: ${{ needs.regression-tests.result }}
            - Performance Tests: ${{ needs.performance-tests.result }}
            
            Check the Actions tab for detailed results.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
